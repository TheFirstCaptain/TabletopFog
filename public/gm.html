<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TabletopFog GM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell gm-shell">
      <header class="page-header">
        <p class="eyebrow">TabletopFog</p>
        <h1>Campaign Library</h1>
        <p id="connection-status" class="status" aria-live="polite">Connecting...</p>
      </header>

      <section class="panel" aria-labelledby="library-heading">
        <div class="section-heading">
          <div>
            <h2 id="library-heading">Campaigns</h2>
            <p id="data-root" class="muted">Loading local data root.</p>
          </div>
        </div>

        <form id="campaign-form" class="inline-form">
          <label for="campaign-name">New campaign</label>
          <input id="campaign-name" name="campaign-name" type="text" autocomplete="off" required />
          <button type="submit">Create</button>
        </form>

        <p id="library-message" class="muted" aria-live="polite"></p>
        <div id="library-diagnostics" class="library-diagnostics" aria-live="polite"></div>
        <div id="campaign-list" class="campaign-list" aria-live="polite"></div>
      </section>

      <section id="campaign-panel" class="panel" aria-labelledby="campaign-heading" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">Open Campaign</p>
            <h2 id="campaign-heading">Campaign</h2>
          </div>
          <button id="back-to-library" class="secondary" type="button">Library</button>
        </div>

        <form id="map-form" class="inline-form">
          <label for="map-file">Add map</label>
          <input id="map-file" name="map-file" type="file" accept="image/*" required />
          <button type="submit">Add</button>
        </form>

        <p id="campaign-message" class="muted" aria-live="polite"></p>

        <div class="workspace-grid">
          <div>
            <h3>Maps</h3>
            <div id="map-list" class="map-list" aria-live="polite"></div>
          </div>

          <div class="active-map-panel">
            <h3>Active Map</h3>
            <div id="active-map-stage" class="gm-map-stage">
              <p id="active-map-message" class="map-state-message muted">No active map selected.</p>
              <canvas id="active-map-canvas" class="map-canvas" role="img" aria-label="" hidden></canvas>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/gm.js"></script>
  </body>
</html>
