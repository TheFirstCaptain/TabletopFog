<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TabletopFog GM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell gm-shell">
      <header class="page-header">
        <h1 class="app-brand">TABLETOPFOG</h1>
        <p id="breadcrumb" class="breadcrumb" aria-label="Breadcrumb">Campaign Library</p>
        <p id="connection-status" class="status" aria-live="polite">Connecting...</p>
      </header>

      <section id="library-panel" class="panel" aria-labelledby="library-heading">
        <div class="section-heading">
          <div>
            <h2 id="library-heading">Campaigns</h2>
          </div>
        </div>

        <div class="player-url-share">
          <label id="player-url-heading" for="player-url">Player Display URL</label>
          <div class="player-url-copy-row">
            <input id="player-url" type="text" readonly />
            <button id="copy-player-url" class="secondary" type="button" aria-label="Copy Player Display URL">
              Copy
            </button>
          </div>
          <p id="player-url-message" class="muted" aria-live="polite"></p>
        </div>

        <form id="campaign-form" class="inline-form">
          <label for="campaign-name">New campaign</label>
          <input id="campaign-name" name="campaign-name" type="text" autocomplete="off" required />
          <button type="submit">Create</button>
        </form>

        <p id="library-message" class="muted" aria-live="polite"></p>
        <div id="library-diagnostics" class="library-diagnostics" aria-live="polite"></div>
        <div id="campaign-list" class="campaign-list" aria-live="polite"></div>
      </section>

      <section id="campaign-panel" class="panel" aria-labelledby="campaign-heading" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">Campaign</p>
            <h2 id="campaign-heading">Campaign</h2>
          </div>
          <button id="back-to-library" class="secondary" type="button">Back to Campaign Library</button>
        </div>

        <p id="campaign-message" class="muted" aria-live="polite"></p>

        <div class="workspace-grid">
          <div id="encounter-gallery" class="encounter-gallery">
            <div class="encounter-gallery-heading">
              <div>
                <h3>Encounters</h3>
                <p class="muted">Browse prepared encounters and open one to prep it.</p>
              </div>
              <form id="map-form" class="add-encounter-form" aria-label="Add Encounter">
                <label for="map-file" class="visually-hidden">Add map</label>
                <input id="map-file" name="map-file" type="file" accept="image/*" required />
                <button type="submit">Add</button>
              </form>
            </div>
            <div id="map-list" class="map-list"></div>
          </div>

          <section
            id="encounter-workspace"
            class="encounter-workspace-shell"
            aria-labelledby="selected-encounter-heading"
            hidden
          >
            <div class="workspace-header">
              <div class="workspace-identity">
                <p class="eyebrow">Encounter Workspace</p>
                <h3 id="selected-encounter-heading">Open an encounter</h3>
                <p id="selected-encounter-status" class="muted">Choose an encounter card to prep it here.</p>
              </div>
              <div class="workspace-navigation">
                <button id="back-to-encounters" class="secondary" type="button">Back to Campaign</button>
              </div>
              <div class="workspace-running-actions" role="group" aria-label="Running actions">
                <button id="workspace-show-to-players" type="button" aria-label="Show to Players from workspace">
                  Show to Players
                </button>
              </div>
            </div>

            <div id="workspace-body" class="workspace-body">
              <div>
                <div id="active-map-stage" class="gm-map-stage">
                  <p id="active-map-message" class="map-state-message muted">No encounter selected.</p>
                  <canvas
                    id="active-map-canvas"
                    class="map-canvas"
                    role="img"
                    aria-label=""
                    tabindex="0"
                    hidden
                  ></canvas>
                  <div id="workspace-fog-overlay" class="workspace-fog-overlay" hidden>
                    <div id="workspace-fog-rectangle" class="workspace-fog-rectangle" hidden></div>
                  </div>
                  <div
                    id="workspace-grid-overlay"
                    class="workspace-grid-overlay"
                    aria-label="5 foot grid overlay"
                    tabindex="0"
                    hidden
                  ></div>
                </div>
              </div>

              <aside class="workspace-tools-panel" aria-labelledby="workspace-tools-heading">
                <p class="eyebrow">Prep Tools</p>
                <h4 id="workspace-tools-heading">Fog</h4>
                <div class="workspace-tool-group fog-tool-group" aria-label="Fog tools">
                  <button id="workspace-hide-tool" class="secondary compact-tool-button" type="button" disabled>
                    Hide rectangle
                  </button>
                  <button id="workspace-reveal-tool" class="secondary compact-tool-button" type="button" disabled>
                    Reveal rectangle
                  </button>
                  <button id="workspace-clear-fog" class="secondary compact-tool-button" type="button" disabled>
                    Clear Fog
                  </button>
                </div>
                <h4>Map Alignment</h4>
                <div class="workspace-tool-group map-zoom-tool-group" aria-label="GM map zoom">
                  <button id="gm-zoom-out" class="secondary compact-tool-button" type="button">Zoom out</button>
                  <button id="gm-zoom-in" class="secondary compact-tool-button" type="button">Zoom in</button>
                  <output id="gm-zoom-level" aria-label="GM map zoom level">100%</output>
                  <button id="gm-fit-map" class="secondary compact-tool-button" type="button">Fit map</button>
                </div>
                <div class="workspace-tool-group" aria-label="Grid alignment">
                  <button id="workspace-grid-toggle" class="secondary compact-tool-button" type="button">
                    Show grid
                  </button>
                  <button id="workspace-grid-lock" class="secondary compact-tool-button" type="button" disabled>
                    Lock grid
                  </button>
                </div>
              </aside>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/gm.js"></script>
  </body>
</html>
