<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TabletopFog Player</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="player-body">
    <main class="player-display">
      <header class="player-status-bar">
        <p class="eyebrow">TabletopFog</p>
        <h1>Player Display</h1>
        <p id="connection-status" class="status" aria-live="polite">Connecting...</p>
        <div id="viewport-controls" class="viewport-controls" role="group" aria-label="Map view controls">
          <button id="zoom-out" class="secondary" type="button" disabled>Zoom out</button>
          <button id="fit-map" class="secondary" type="button" disabled>Fit map</button>
          <output id="zoom-level" aria-label="Zoom level" aria-live="polite">100%</output>
          <button id="zoom-in" class="secondary" type="button" disabled>Zoom in</button>
        </div>
      </header>

      <section class="map-stage">
        <p id="player-message" class="player-message map-state-message">Waiting for GM.</p>
        <p id="map-instructions" class="visually-hidden">Use arrow keys to pan a zoomed map.</p>
        <canvas
          id="player-map"
          class="player-map map-canvas"
          role="img"
          aria-label=""
          aria-describedby="map-instructions"
          tabindex="0"
          hidden
        ></canvas>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/player.js"></script>
  </body>
</html>
