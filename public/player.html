<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TabletopFog Player</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="player-body">
    <main class="player-display">
      <header class="player-status-bar">
        <p class="eyebrow">TabletopFog</p>
        <h1>Player Display</h1>
        <p id="connection-status" class="status" aria-live="polite">Connecting...</p>
      </header>

      <section class="map-stage" aria-live="polite">
        <p id="player-message" class="player-message">Waiting for GM.</p>
        <img id="player-map" class="player-map" alt="" hidden>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/player.js"></script>
  </body>
</html>
