<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TabletopFog Player</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell player-shell">
      <header class="page-header">
        <p class="eyebrow">TabletopFog</p>
        <h1>Player</h1>
        <p id="connection-status" class="status" aria-live="polite">Connecting...</p>
      </header>

      <section class="display" aria-labelledby="counter-heading">
        <h2 id="counter-heading">Shared Counter</h2>
        <p id="counter-value" class="player-counter" aria-live="polite">0</p>
        <p id="updated-at" class="muted">Waiting for state.</p>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/player.js"></script>
  </body>
</html>
